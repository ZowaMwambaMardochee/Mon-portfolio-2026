<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Portfolio</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;400;700;900&display=swap" rel="stylesheet">

    <!-- Font Awesome (icônes) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="logo">
            <a href="index.html">Mon Portfolio</a>
        </div>

        <nav>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="projets.html">Projets</a></li>
                <li><a href="passions.html">Passions</a></li>
                <li><a href="divertissement.html">Divertissement</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- MAIN -->
    <main class="contact-main">
        <h1 class="contact-title">Contactez-nous</h1>

        <div class="contact-container">

            <!-- INFOS -->
            <section class="info-box">
                <h2>Mes Coordonnées</h2>

                <div class="info-detail">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Lubumbashi, RDC</span>
                </div>

                <div class="info-detail">
                    <i class="fa-solid fa-phone"></i>
                    <span>+243 990477414</span>
                </div>

                 <div class="contact-btns">
                    <a href="#" class="btn-item whatsapp-btn">
                        <i class="fa-brands fa-whatsapp"></i> WhatsApp
                    </a>
                    <a href="#" class="btn-item facebook-btn">
                        <i class="fa-brands fa-facebook"></i> Facebook
                    </a>
                </div>
            </section>

            <section class="form-box">
                <h2>Envoyez-moi un message</h2>

                <form>
                    <div class="field">
                        <label>Nom complet</label>
                        <input type="text" placeholder="Votre nom" required>
                    </div>

                    <div class="field">
                        <label>Téléphone</label>
                        <input type="text" value="+243" required>
                    </div>

                    <button type="submit" class="submit-btn">
                        ENVOYER
                    </button>
                </form>
            </section>

        </div>
    </main>

    <footer>
        <p>&copy; 2026 Zowa. Tous droits réservés.</p>

        <div class="social-icons">
            <a href="#"><i class="fa-brands fa-github"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin"></i></a>
            <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
        </div>
    </footer>

</body>
</html>
